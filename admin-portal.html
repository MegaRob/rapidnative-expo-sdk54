    // ─── Image upload helper (uploads to Firebase Storage, returns download URL) ──
    async function uploadImageToStorage(file, onProgress) {
      const uniqueName = Date.now() + '_' + Math.random().toString(36).slice(2) + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '');
      const fileRef = storage.ref('race_uploads/' + uniqueName);
      return new Promise((resolve, reject) => {
        const task = fileRef.put(file);
        task.on('state_changed',
          (snap) => {
            const pct = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
            if (onProgress) onProgress(pct);
          },
          (err) => reject(err),
          async () => {
            const url = await task.snapshot.ref.getDownloadURL();
            resolve(url);
          }
        );
      });
    }

    function formatDate(value) {
      if (!value) return "TBD";
      if (typeof value === "string") return value;
      if (value?.seconds) {
        return new Date(value.seconds * 1000).toLocaleDateString();
      }
      if (value?.toDate) {
        return value.toDate().toLocaleDateString();
      }
      return "TBD";
    }

    function getCoordinatesForCity(cityName) {
      const normalized = String(cityName || "").trim();
      if (!normalized) return null;
      if (CITY_COORDINATES[normalized]) return CITY_COORDINATES[normalized];
      const cityKey = Object.keys(CITY_COORDINATES).find(
        key => key.toLowerCase() === normalized.toLowerCase()
      );
      return cityKey ? CITY_COORDINATES[cityKey] : null;
    }

    // ─── Reusable Image Upload Component ──────────────────────────────────────
    function ImageUploadField({ label, emoji, value, onChange }) {
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [error, setError] = useState(null);
      const fileRef = useRef(null);

      const handleFile = useCallback(async (file) => {
        if (!file) return;
        if (!file.type.startsWith('image/')) { setError('Please select an image file.'); return; }
        if (file.size > 10 * 1024 * 1024) { setError('Image must be under 10 MB.'); return; }
        setError(null);
        setUploading(true);
        setProgress(0);
        try {
          const url = await uploadImageToStorage(file, (pct) => setProgress(pct));
          onChange(url);
        } catch (err) {
          console.error('Upload error:', err);
          setError('Upload failed. Try again.');
        } finally {
          setUploading(false);
        }
      }, [onChange]);

      const handleDrop = useCallback((e) => {
        e.preventDefault(); e.stopPropagation();
        e.currentTarget.classList.remove('border-emerald-400', 'bg-emerald-500/5');
        const file = e.dataTransfer?.files?.[0];
        handleFile(file);
      }, [handleFile]);

      const handleDragOver = useCallback((e) => {
        e.preventDefault();
        e.currentTarget.classList.add('border-emerald-400', 'bg-emerald-500/5');
      }, []);

      const handleDragLeave = useCallback((e) => {
        e.currentTarget.classList.remove('border-emerald-400', 'bg-emerald-500/5');
      }, []);

      return (
        <div className="flex flex-col gap-1">
          <label className="text-xs text-slate-400">{label}</label>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {/* Upload zone */}
            <div
              className="border-2 border-dashed border-slate-700 rounded-lg p-4 text-center cursor-pointer hover:border-emerald-400 transition-colors"
              onDragOver={handleDragOver}
              onDragLeave={handleDragLeave}
              onDrop={handleDrop}
              onClick={() => fileRef.current?.click()}
            >
              <input
                type="file"
                ref={fileRef}
                accept="image/*"
                className="hidden"
                onChange={(e) => handleFile(e.target.files?.[0])}
              />
              <div className="text-2xl mb-1">{emoji || '📷'}</div>
              <p className="text-xs text-slate-300 font-medium">Drag & drop or click</p>
              <p className="text-xs text-slate-500 mt-1">PNG, JPG, WEBP · Max 10 MB</p>
              {uploading && (
                <div className="mt-2 w-full bg-slate-700 rounded-full h-1.5">
                  <div className="bg-emerald-500 h-1.5 rounded-full transition-all" style={{ width: progress + '%' }} />
                </div>
              )}
              {uploading && <p className="text-xs text-emerald-400 mt-1">Uploading {progress}%</p>}
              {error && <p className="text-xs text-red-400 mt-1">{error}</p>}
            </div>
            {/* URL input + preview */}
            <div className="flex flex-col gap-2">
              <p className="text-xs text-slate-500">Or paste a URL</p>
              <input
                className="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm"
                placeholder="https://..."
                value={value || ''}

                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

            isVisibleOnApp,
          });

          const payload = result?.data || {};
          const message = payload.tempPassword
            ? `Director account created. Temporary password: ${payload.tempPassword}`
            : payload.resetLink
              ? `Director exists. Reset link: ${payload.resetLink}`
              : "Director linked.";

          console.error("Approve request failed:", error);
          alert("Failed to approve request.");
        }
      };

      const handleDirectorResetLink = async (directorId) => {
        if (!directorId) return;
        try {
          const directorEmail = directorDetails[directorId]?.email || "";
          const generateLink = functions.httpsCallable("generateDirectorResetLink");
          const result = await generateLink({ directorId, directorEmail });
          const resetLink = result?.data?.resetLink;
          if (resetLink) {
            alert(`Reset link: ${resetLink}`);
          } else {
            alert("Reset link not available.");
          }
        } catch (error) {
          console.error("Failed to generate reset link:", error);
          alert("Failed to generate reset link.");
        }
      };

      const deleteRegistrationsForRace = async (raceId) => {
        let snapshot = await db
          .collection("registrations")
          .where("trailId", "==", raceId)
          .limit(450)
          .get();

        while (!snapshot.empty) {
          const batch = db.batch();
          snapshot.docs.forEach((doc) => batch.delete(doc.ref));
          await batch.commit();
          snapshot = await db
            .collection("registrations")
            .where("trailId", "==", raceId)
            .limit(450)
            .get();
        }
      };

      const handleDeleteRace = async (raceId) => {
        if (!raceId) return;
        const confirmed = window.confirm(
          "Delete this race? This will remove the race and its registrations."

        try {
          await deleteRegistrationsForRace(raceId);
          await db.collection("trails").doc(raceId).delete();
          setSelectedRaceId(null);
          alert("Race deleted.");
        } catch (error) {
          console.error("Failed to delete race:", error);
          alert("Failed to delete race.");
        }
      };

      const handleAddRace = async () => {
        if (!raceForm.name || !raceForm.location || !raceForm.description || !raceForm.refundTerms) {
          alert("Race Name, Location, Description, and Refund Terms are required.");
        return;
      }
        // Build distances array
        const distances = raceDistances.map(d => ({
          raceTitle: d.raceTitle || "",
          label: d.label || "",
          price: d.price ? parseFloat(d.price) || 0 : 0,
          startTime: d.startTime || "",
          elevationGain: d.elevationGain || "",
          cutoffTime: d.cutoffTime || "",
          capacity: d.capacity ? parseInt(d.capacity, 10) || 0 : 0,
          terrainTechnicality: d.terrainTechnicality ? parseInt(d.terrainTechnicality, 10) || 0 : 0,
          gpxRouteLink: d.gpxRouteLink || "",
          // Guide fields per distance
          aidStations: d.aidStations ? parseInt(d.aidStations, 10) || 0 : 0,
          aidStationDetails: d.aidStationDetails || "",
          mandatoryGear: d.mandatoryGear || "",
          terrainNotes: d.terrainNotes || "",
          pacerPolicy: d.pacerPolicy || "",
          crewAccess: d.crewAccess || "",
          crewParking: d.crewParking || "",
          description: d.description || "",
        }));
        const distancesOffered = distances.map(d => d.label).filter(Boolean);
        const coords = getCoordinatesForCity(raceForm.location);

        try {
          const trailRef = await db.collection("trails").add({
            name: raceForm.name,
            location: raceForm.location,
            date: raceForm.date || "",
            registrationStartDate: raceForm.registrationStartDate || "",
            registrationEndDate: raceForm.registrationEndDate || "",
            slogan: raceForm.slogan || "",
            description: raceForm.description || "",
            image: raceForm.featuredImageUrl || "",
            imageUrl: raceForm.featuredImageUrl || "",
            logoUrl: raceForm.logoUrl || "",
            distancesOffered: distancesOffered,
            distances: distances,
            checkInDetails: raceForm.checkInDetails || "",
            refundTerms: raceForm.refundTerms || "",
            contactName: raceForm.contactName || "",
            contactEmail: raceForm.contactEmail || "",
            contactPhone: raceForm.contactPhone || "",
            website: raceForm.website || "",
            socialMedia: raceForm.socialMedia || "",
            notes: raceForm.notes || "",
            // Use first distance values as top-level defaults
            price: distances[0]?.price || 0,
            elevation: distances[0]?.elevationGain || "",
            elevationGain: distances[0]?.elevationGain || "",
            startTime: distances[0]?.startTime || "",
            cutoffTime: distances[0]?.cutoffTime || "",
            capacity: distances[0]?.capacity || 0,
            terrainTechnicality: distances[0]?.terrainTechnicality || 0,
            gpxRouteLink: distances[0]?.gpxRouteLink || "",
            guideOptIn: raceForm.guideOptIn === true,
            isVisibleOnApp: raceForm.isVisibleOnApp === true,
            ...(coords ? { latitude: coords.lat, longitude: coords.lon } : {}),
            createdAt: new Date(),
          });

          // If guide is opted in, create the raceGuides document
          if (raceForm.guideOptIn === true) {
            await db.collection("raceGuides").doc(trailRef.id).set({
              trailId: trailRef.id,
              name: raceForm.name || "",
              location: raceForm.location || "",
              date: raceForm.date || "",
              startTime: distances[0]?.startTime || "",
              imageUrl: raceForm.featuredImageUrl || "",
              logoUrl: raceForm.logoUrl || "",
              distances: distances,
              distancesOffered: distancesOffered,
              elevationGain: distances[0]?.elevationGain || "",
              terrainNotes: distances[0]?.terrainNotes || "",
              aidStations: distances[0]?.aidStations || 0,
              aidStationDetails: distances[0]?.aidStationDetails || "",
              cutoffTime: distances[0]?.cutoffTime || "",
              mandatoryGear: distances[0]?.mandatoryGear || "",
              checkInDetails: raceForm.checkInDetails || "",
              pacerPolicy: distances[0]?.pacerPolicy || "",
              crewAccess: distances[0]?.crewAccess || "",
              crewParking: distances[0]?.crewParking || "",
              description: distances[0]?.description || "",
              website: raceForm.website || "",
              contactName: raceForm.contactName || "",
              contactEmail: raceForm.contactEmail || "",
              status: "published",
              isPublished: true,
              createdAt: new Date(),
              updatedAt: new Date(),
            });
          }

          setRaceForm({
            name: "", location: "", date: "", registrationStartDate: "", registrationEndDate: "",
            slogan: "", description: "", featuredImageUrl: "", logoUrl: "",
            checkInDetails: "", refundTerms: "", contactName: "", contactEmail: "", contactPhone: "",
            website: "", socialMedia: "", notes: "", isVisibleOnApp: true, guideOptIn: false,
          });
          setRaceDistances([emptyDistance()]);
          alert("Race added.");
          setTab("races");
      } catch (error) {
          console.error("Add race failed:", error);
          alert("Failed to add race.");
        }
      };

      const handleBackfillCoordinates = async () => {
        if (!isAdmin) return;
        setIsBackfilling(true);
        try {
          const snapshot = await db.collection("trails").get();
          const updates = snapshot.docs.map((docSnap) => {
            const data = docSnap.data();
            const hasCoords =
              Number.isFinite(Number(data?.latitude)) && Number.isFinite(Number(data?.longitude));
            if (hasCoords) {
              return null;
            }
            const coords = getCoordinatesForCity(data?.location);
            if (!coords) {
              return null;
            }
            return db.collection("trails").doc(docSnap.id).update({
              latitude: coords.lat,
              longitude: coords.lon,
              updatedAt: new Date(),
            });
          });
          const pending = updates.filter(Boolean);
          if (pending.length > 0) {
            await Promise.all(pending);
          }
          alert("Coordinate backfill complete.");
        } catch (error) {
          console.error("Backfill failed:", error);
          alert("Backfill failed. Check console for details.");
        } finally {
          setIsBackfilling(false);
        }
      };

      const buildRaceUpdateFromRequest = (data) => {
        const update = {};
        const setIf = (key, value) => {
          if (value === undefined || value === null) return;
          if (typeof value === "string" && value.trim() === "") return;
          update[key] = value;
        };

        setIf("name", data.raceName || data.name);
        setIf("slogan", data.slogan);
        setIf("location", data.location);
        setIf("date", data.date);
        setIf("startTime", data.startTime);

        const distances = Array.isArray(data.distancesOffered)
          ? data.distancesOffered
          : typeof data.distancesOffered === "string"
            ? data.distancesOffered.split(",").map((d) => d.trim()).filter(Boolean)
            : [];
        if (distances.length > 0) {
          update.distancesOffered = distances;
        }

        const elevationValue = data.elevationGain || data.elevation;
        setIf("elevationGain", elevationValue);
        setIf("elevation", elevationValue);
        setIf("elevationProfiles", data.elevationProfiles);

        if (data.terrainTechnicality !== undefined && data.terrainTechnicality !== "") {
          const parsed = parseInt(data.terrainTechnicality, 10);
          if (!Number.isNaN(parsed)) {
            update.terrainTechnicality = parsed;
          }
        }

        setIf("description", data.description);
        setIf("logoUrl", data.logoUrl);
        setIf("gpxRouteLink", data.gpxRouteLink);
        setIf("pacerPolicy", data.pacerPolicy);
        setIf("crewAccess", data.crewAccess);
        setIf("refundTerms", data.refundTerms);
        setIf("utmbIndex", data.utmbIndex);
        setIf("itraPoints", data.itraPoints);
        setIf("westernStatesQualifier", data.westernStatesQualifier);
        setIf("cutoffTime", data.cutoffTime);
        setIf("difficulty", data.difficulty);
        setIf("website", data.website);
        setIf("socialMedia", data.socialMedia);
        setIf("contactName", data.contactName);
        setIf("contactEmail", data.contactEmail);
        setIf("contactPhone", data.contactPhone);

        const imageValue = data.imageUrl || data.image;
        setIf("image", imageValue);
        setIf("imageUrl", imageValue);

        if (data.price !== undefined && data.price !== "") {
          const parsed = parseFloat(data.price);
          if (!Number.isNaN(parsed)) {
            update.price = parsed;
          }
        }

        if (data.capacity !== undefined && data.capacity !== "") {
          const parsed = parseInt(data.capacity, 10);
          if (!Number.isNaN(parsed)) {
            update.capacity = parsed;
          }
        }

        return update;
      };

      const handleBackfillApprovedRequests = async () => {
        if (!isAdmin) return;
        setIsBackfillingRequests(true);
        try {
          const snapshot = await db.collection("raceRequests").where("status", "==", "approved").get();
          let batch = db.batch();
          let batchCount = 0;
          let updatedCount = 0;

          snapshot.forEach((docSnap) => {
            const data = docSnap.data() || {};
            const trailId = data.trailId;
            if (!trailId) return;
            const update = buildRaceUpdateFromRequest(data);
            if (Object.keys(update).length === 0) return;
            update.updatedAt = new Date();
            const ref = db.collection("trails").doc(trailId);
            batch.set(ref, update, { merge: true });
            batchCount += 1;
            updatedCount += 1;
            if (batchCount >= 400) {
              batch.commit();
              batch = db.batch();
              batchCount = 0;
            }
          });

          if (batchCount > 0) {
            await batch.commit();
          }

          alert(`Backfill complete. Updated ${updatedCount} race${updatedCount === 1 ? "" : "s"}.`);
        } catch (error) {
          console.error("Request backfill failed:", error);
          alert("Request backfill failed. Check console for details.");
        } finally {
          setIsBackfillingRequests(false);
        }
      };

                >

        </button>
    </div>
            </div>
          </div>

        <button

                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-slate-400">Contact Phone</label>
                      <input className="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2" value={raceForm.contactPhone} onChange={(e) => setRaceForm({ ...raceForm, contactPhone: e.target.value })} />
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-slate-400">Race Website</label>
                      <input className="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2" placeholder="https://..." value={raceForm.website} onChange={(e) => setRaceForm({ ...raceForm, website: e.target.value })} />
                    </div>
                    <div className="flex flex-col gap-1">
                      <label className="text-xs text-slate-400">Social Media</label>
                      <input className="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2" value={raceForm.socialMedia} onChange={(e) => setRaceForm({ ...raceForm, socialMedia: e.target.value })} />
                    </div>
                  </div>
                </div>

                {/* --- Additional Notes --- */}
                <div>
                  <h4 className="text-sm font-semibold text-slate-300 mb-3 border-b border-slate-700 pb-1">Additional</h4>
                  <div className="flex flex-col gap-1">
                    <label className="text-xs text-slate-400">Additional Notes</label>
                    <textarea className="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 min-h-[80px]" value={raceForm.notes} onChange={(e) => setRaceForm({ ...raceForm, notes: e.target.value })} />
                  </div>
                </div>

                {/* --- Visibility + Submit --- */}
                <label className="flex items-center gap-2 text-xs text-slate-300">
                  <input type="checkbox" checked={raceForm.isVisibleOnApp === true} onChange={(e) => setRaceForm({ ...raceForm, isVisibleOnApp: e.target.checked })} />
                  Show this race on the app
                </label>
                <button onClick={handleAddRace} className="bg-emerald-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-emerald-600 transition">
                  Add Race
        </button>
    </div>
            )}
          </main>
  </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AdminPortal />);
  </script>
</body>
</html>
