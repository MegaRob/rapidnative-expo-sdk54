<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Collective Race Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { emerald: { 500: "#10b981" } } } } };
  </script>
  <style>
    .glass {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(16, 185, 129, 0.12);
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(16px);
    }
    .dist-tab { cursor: pointer; transition: all 0.2s; }
    .dist-tab.active { background: #10b981; color: white; }
    .dist-tab:not(.active) { background: rgba(15, 23, 42, 0.8); color: #94a3b8; }
    .dist-tab:not(.active):hover { color: #e2e8f0; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root" class="max-w-5xl mx-auto px-6 py-10"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAcKYEhZyUgwUV58uWEVbI4Gwkn65miHt4",
      authDomain: "trailmatch-49203553-49000.firebaseapp.com",
      projectId: "trailmatch-49203553-49000",
      storageBucket: "trailmatch-49203553-49000.firebasestorage.app",
      messagingSenderId: "1048323489461",
      appId: "1:1048323489461:web:e3c514fcf0d7748ef848fc"
    };

    const appName = "director-portal";
    const guideApp = firebase.apps.find((a) => a.name === appName)
      ? firebase.app(appName) : firebase.initializeApp(firebaseConfig, appName);
    const auth = guideApp.auth();
    const db = guideApp.firestore();

    const params = new URLSearchParams(window.location.search);
    const guideId = params.get("trailId") || params.get("id") || params.get("raceId");
    const fallbackImage = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200&auto=format&fit=crop&q=70";

    let raceData = null;
    let selectedIdx = 0;

    function normalizeImageUrl(value) {
      if (typeof value !== "string") return "";
      const trimmed = value.trim().replace(/^['"]+|['"]+$/g, "");
      if (!trimmed) return "";
      // Don't encodeURI URLs that are already valid — it double-encodes %2F in Firebase Storage URLs
      if (trimmed.startsWith("http://") || trimmed.startsWith("https://")) return trimmed;
      if (trimmed.startsWith("//")) return "https:" + trimmed;
      if (trimmed.startsWith("www.")) return "https://" + trimmed;
      const encoded = encodeURI(trimmed);
      if (/^[A-Za-z0-9.-]+\.[A-Za-z]{2,}(\/|$)/.test(encoded)) return "https://" + encoded;
      return "";
    }

    function getDisplayDate(value) {
      if (!value) return "TBD";
      if (typeof value === "string") return value;
      if (value?.seconds) return new Date(value.seconds * 1000).toLocaleDateString();
      if (value?.toDate) return value.toDate().toLocaleDateString();
      return "TBD";
    }

    function esc(str) { return String(str || "").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function renderError(message) {
      document.getElementById("root").innerHTML = `
        <div class="glass rounded-2xl p-8 text-center">
          <h1 class="text-2xl font-semibold text-emerald-400 mb-3">Race Guide</h1>
          <p class="text-slate-300">${message}</p>
        </div>`;
    }

    function selectDistance(idx) {
      selectedIdx = idx;
      renderGuide(raceData);
    }

    function renderGuide(data) {
      if (!data) return;
      raceData = data;
      const guide = data?.guide || {};
      const links = guide?.links || {};

      const name = esc(data?.name || "Race");
      const location = esc(data?.location || "Location TBD");
      const date = esc(getDisplayDate(data?.date));
      const image = normalizeImageUrl(data?.imageUrl) || normalizeImageUrl(data?.image) || normalizeImageUrl(data?.featuredImageUrl) || fallbackImage;
      const website = links?.website || data?.website || "";
      const contactEmail = links?.contactEmail || data?.contactEmail || "";

      const distArr = Array.isArray(data?.distances) ? data.distances : [];
      const hasMultiple = distArr.length > 1;
      const safeIdx = Math.min(selectedIdx, Math.max(distArr.length - 1, 0));
      const d = distArr[safeIdx] || {};

      // Per-distance values with event-level fallbacks
      const distLabel = esc(d.label || "");
      const distStartTime = esc(d.startTime || data?.startTime || "TBD");
      const distCutoff = esc(d.cutoffTime || data?.cutoffTime || "TBD");
      const distElevation = esc(d.elevationGain || data?.elevationGain || data?.elevation || "TBD");
      const distCapacity = d.capacity || data?.capacity || "";
      const distPrice = parseFloat(d.price) || parseFloat(data?.price) || 0;
      const distAidStations = d.aidStations || data?.aidStations || "TBD";
      const distAidStationDetails = esc(d.aidStationDetails || data?.aidStationDetails || "Aid station details coming soon.");
      const distMandatoryGear = esc(d.mandatoryGear || guide?.essentials?.mandatoryGear || data?.mandatoryGear || "Mandatory gear coming soon.");
      const distCheckIn = esc(d.checkInDetails || guide?.essentials?.checkInInfo || data?.checkInDetails || "Check-in details coming soon.");
      const distTerrainNotes = esc(d.terrainNotes || guide?.courseProfile?.terrainNotes || data?.terrainNotes || "Terrain details coming soon.");
      const distPacerPolicy = esc(d.pacerPolicy || guide?.rules?.pacerRules || data?.pacerPolicy || "Pacer policy coming soon.");
      const distCrewAccess = esc(d.crewAccess || guide?.rules?.crewAccess || data?.crewAccess || "Crew access details coming soon.");
      const distCrewParking = esc(d.crewParking || guide?.rules?.parkingInfo || data?.crewParking || "Crew parking details coming soon.");
      const distDescription = esc(d.description || data?.description || "");

      document.getElementById("root").innerHTML = `
        <!-- Header -->
        <header class="glass rounded-2xl p-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="text-xs uppercase tracking-widest text-emerald-300">Race Guide</p>
            <h1 class="text-3xl font-semibold text-emerald-400">${name}</h1>
            <p class="text-sm text-slate-300 mt-1">${date} · ${location}</p>
          </div>
          <img src="${image}" alt="${name}" class="w-28 h-20 object-cover rounded-xl border border-emerald-500/30" />
        </header>

        <!-- Distance Tabs -->
        ${hasMultiple ? `
          <div class="flex gap-2 flex-wrap mt-6">
            ${distArr.map((dd, i) => `
              <button onclick="selectDistance(${i})" class="dist-tab px-5 py-2 rounded-full text-sm font-semibold ${i === safeIdx ? 'active' : ''}">${esc(dd.label || "Distance " + (i + 1))}</button>
            `).join("")}
          </div>
        ` : ""}

        <!-- Quick Overview -->
        <section class="glass rounded-2xl p-6 mt-6">
          <h2 class="text-xl font-semibold text-emerald-300 mb-4">Quick Overview</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Race Date</p>
              <p class="text-lg font-semibold">${date}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Location</p>
              <p class="text-lg font-semibold">${location}</p>
            </div>
            ${distLabel ? `
              <div class="bg-slate-900/70 rounded-xl p-4">
                <p class="text-slate-400 uppercase tracking-wider text-xs">Distance</p>
                <p class="text-lg font-semibold text-emerald-400">${distLabel}</p>
              </div>
            ` : ""}
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Start Time</p>
              <p class="text-lg font-semibold">${distStartTime}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Cutoff</p>
              <p class="text-lg font-semibold">${distCutoff}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Elevation Gain</p>
              <p class="text-lg font-semibold">${distElevation}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs">Aid Stations</p>
              <p class="text-lg font-semibold">${distAidStations}</p>
            </div>
            ${distPrice > 0 ? `
              <div class="bg-slate-900/70 rounded-xl p-4">
                <p class="text-slate-400 uppercase tracking-wider text-xs">Price</p>
                <p class="text-lg font-semibold">$${distPrice}</p>
              </div>
            ` : ""}
          </div>
        </section>

        <!-- Race Day Essentials -->
        <section class="glass rounded-2xl p-6 mt-6">
          <h3 class="text-lg font-semibold text-emerald-300 mb-3">Race Day Essentials</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-slate-200">
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Mandatory Gear</p>
              <p class="whitespace-pre-line">${distMandatoryGear}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Check-In</p>
              <p class="whitespace-pre-line">${distCheckIn}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Start Time</p>
              <p>${distStartTime}</p>
            </div>
          </div>
        </section>

        <!-- Course Profile -->
        <section class="glass rounded-2xl p-6 mt-6">
          <h3 class="text-lg font-semibold text-emerald-300 mb-3">Course Profile</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-200">
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Elevation Gain</p>
              <p class="text-lg font-semibold mb-3">${distElevation}</p>
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Terrain Notes</p>
              <p class="whitespace-pre-line">${distTerrainNotes}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Aid Station Details</p>
              <p class="whitespace-pre-line">${distAidStationDetails}</p>
            </div>
          </div>
        </section>

        <!-- Pacer + Crew Rules -->
        <section class="glass rounded-2xl p-6 mt-6">
          <h3 class="text-lg font-semibold text-emerald-300 mb-3">Pacer + Crew Rules</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-slate-200">
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Pacers</p>
              <p class="whitespace-pre-line">${distPacerPolicy}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Crew Access</p>
              <p class="whitespace-pre-line">${distCrewAccess}</p>
            </div>
            <div class="bg-slate-900/70 rounded-xl p-4">
              <p class="text-slate-400 uppercase tracking-wider text-xs mb-1">Crew Parking</p>
              <p class="whitespace-pre-line">${distCrewParking}</p>
            </div>
          </div>
        </section>

        <!-- Race Notes -->
        ${distDescription ? `
          <section class="glass rounded-2xl p-6 mt-6">
            <h3 class="text-lg font-semibold text-emerald-300 mb-3">Race Notes</h3>
            <p class="text-sm text-slate-300 whitespace-pre-line">${distDescription}</p>
            ${website ? `<p class="mt-4 text-sm"><a class="text-emerald-300 hover:underline" href="${website}" target="_blank" rel="noreferrer">Race Website</a></p>` : ""}
            ${contactEmail ? `<p class="mt-2 text-sm text-emerald-300">Contact: ${contactEmail}</p>` : ""}
          </section>
        ` : (website || contactEmail ? `
          <section class="glass rounded-2xl p-6 mt-6">
            <h3 class="text-lg font-semibold text-emerald-300 mb-3">Links</h3>
            ${website ? `<p class="text-sm"><a class="text-emerald-300 hover:underline" href="${website}" target="_blank" rel="noreferrer">Race Website</a></p>` : ""}
            ${contactEmail ? `<p class="mt-2 text-sm text-emerald-300">Contact: ${contactEmail}</p>` : ""}
          </section>
        ` : "")}
      `;
    }

    // Expose to global for tab clicks
    window.selectDistance = selectDistance;

    if (!guideId) {
      renderError("Missing trailId. Add ?trailId=YOUR_RACE_ID to the URL.");
    } else {
      auth.onAuthStateChanged((user) => {
        if (!user) { renderError("Please sign in to view this race guide."); return; }
        db.collection("trails").doc(guideId).get()
          .then((snap) => { if (!snap.exists) { renderError("Race guide not found."); return; } renderGuide(snap.data()); })
          .catch(() => renderError("Unable to load race guide."));
      });
    }
  </script>
</body>
</html>
