    /* ---------- Image upload helper for director portal ---------- */
    function uploadImageToStorage(file, callback, onProgress) {
      const uniqueName = Date.now() + '_' + Math.random().toString(36).slice(2) + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '');
      const fileRef = storage.ref('race_uploads/' + uniqueName);
      const task = fileRef.put(file);
      task.on('state_changed',
        (snap) => { if (onProgress) onProgress(Math.round((snap.bytesTransferred / snap.totalBytes) * 100)); },
        (err) => { console.error('Upload error:', err); alert('Upload failed: ' + err.message); },
        async () => { const url = await task.snapshot.ref.getDownloadURL(); callback(url); }
      );
    }

    /* ImageUploadField React component */
    function ImageUploadField({ label, value, onChange, emoji }) {
      const [uploading, setUploading] = useState(false);
      const [progress, setProgress] = useState(0);
      const fileRef = React.useRef(null);

      const handleFile = (file) => {
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('Please select an image file.'); return; }
        if (file.size > 10 * 1024 * 1024) { alert('Image must be under 10 MB.'); return; }
        setUploading(true);
        uploadImageToStorage(file,
          (url) => { onChange(url); setUploading(false); setProgress(0); },
          (pct) => setProgress(pct)
        );
      };

      const handleDrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer?.files?.[0]); };
      const handleDragOver = (e) => { e.preventDefault(); };

      return (
        <div className="col-span-2">
          <p className="text-xs text-slate-400 mb-2">{label}</p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div
              className="border-2 border-dashed border-slate-700 rounded-2xl p-4 text-center cursor-pointer hover:border-emerald-400 transition-colors"
              onDrop={handleDrop} onDragOver={handleDragOver}
              onClick={() => fileRef.current?.click()}
            >
              <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={(e) => handleFile(e.target.files?.[0])} />
              <div className="text-2xl mb-1">{emoji || '📷'}</div>
              <p className="text-xs text-slate-300 font-medium">Drag & drop or click</p>
              <p className="text-[10px] text-slate-500 mt-1">PNG, JPG, WEBP · Max 10 MB</p>
              {uploading && (
                <div className="mt-2 w-full bg-slate-800 rounded-full h-1.5">
                  <div className="bg-emerald-500 h-1.5 rounded-full transition-all" style={{ width: progress + '%' }}></div>
                </div>
              )}
            </div>
            <div>
              <p className="text-[10px] text-slate-500 mb-1">Or paste URL</p>
              <input
                className="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-slate-100 text-sm"
                value={value || ''}
                onChange={(e) => onChange(e.target.value)}
                placeholder="https://..."
              />
              {value && (
                <div className="mt-2 rounded-xl overflow-hidden border border-slate-700" style={{ maxHeight: 100 }}>
                  <img src={value} alt="preview" className="w-full object-cover" style={{ maxHeight: 100 }} onError={(e) => { e.target.parentElement.style.display = 'none'; }} />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const formatMoney = (value) => `$${(value || 0).toLocaleString()}`;
    const formatPercent = (value) => `${Math.round(value || 0)}%`;
    const formatDate = (value) => {
      if (!value) return "TBD";
      if (typeof value === "string") return value;
      if (value?.seconds) return new Date(value.seconds * 1000).toLocaleDateString();
      if (value?.toDate) return value.toDate().toLocaleDateString();
      return "TBD";
    };

    const parseSegments = (value) => {
      if (Array.isArray(value)) {
        return value.filter(Boolean).map((segment) => ({
          label: segment?.label || "",
          value: segment?.value || "",
        }));
      }
      if (typeof value === "string" && value.trim()) {
        return value
          .split(/\n|;/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const [label, ...rest] = line.split(":");
            const tail = rest.join(":").trim();
            return tail
              ? { label: label.trim(), value: tail }
              : { label: "", value: line };
          });
      }
      return [];
    };

    const parseAidStations = (value, details) => {
      if (Array.isArray(value)) {
        return value.filter(Boolean).map((station) => ({
          name: station?.name || "",
          mile: station?.mile || "",
          service: station?.service || "",
        }));
      }
      if (typeof details === "string" && details.trim()) {
        return details
          .split(/\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => ({ name: line, mile: "", service: "" }));
      }
      return [];
    };

    const normalizeGuideEditor = (race) => {
      const guide = race?.guide || {};

      // Build distances array with per-distance guide fields
      let distances = [];
      if (Array.isArray(race?.distances) && race.distances.length > 0) {
        distances = race.distances.map((d) => ({
          label: d.label || "",
          price: d.price?.toString?.() || "",
          startTime: d.startTime || "",
          elevationGain: d.elevationGain || "",
          cutoffTime: d.cutoffTime || "",
          capacity: d.capacity?.toString?.() || "",
          terrainTechnicality: d.terrainTechnicality?.toString?.() || "",
          gpxRouteLink: d.gpxRouteLink || "",
          // Per-distance guide fields
          aidStations: d.aidStations?.toString?.() || "",
          aidStationDetails: d.aidStationDetails || "",
          mandatoryGear: d.mandatoryGear || "",
          checkInDetails: d.checkInDetails || "",
          terrainNotes: d.terrainNotes || "",
          pacerPolicy: d.pacerPolicy || "",
          crewAccess: d.crewAccess || "",
          crewParking: d.crewParking || "",
          description: d.description || "",
        }));
      } else {
        const labels = Array.isArray(race?.distancesOffered) ? race.distancesOffered : [];
        distances = [{
          label: labels[0] || "",
          price: race?.price?.toString?.() || "",
          startTime: race?.startTime || "",
          elevationGain: race?.elevationGain || race?.elevation || "",
          cutoffTime: race?.cutoffTime || "",
          capacity: race?.capacity?.toString?.() || "",
          terrainTechnicality: race?.terrainTechnicality?.toString?.() || "",
          gpxRouteLink: race?.gpxRouteLink || "",
          // Fallback to event-level guide fields
          aidStations: race?.aidStations?.toString?.() || "",
          aidStationDetails: race?.aidStationDetails || "",
          mandatoryGear: guide?.essentials?.mandatoryGear || race?.mandatoryGear || "",
          terrainNotes: guide?.courseProfile?.terrainNotes || race?.terrainNotes || "",
          pacerPolicy: guide?.rules?.pacerRules || race?.pacerPolicy || "",
          crewAccess: guide?.rules?.crewAccess || race?.crewAccess || "",
          crewParking: guide?.rules?.parkingInfo || race?.crewParking || "",
          description: race?.description || "",
        }];
      }

      return {
        distances,
        date: getDateInputValue(race?.date),
        location: race?.location || "",
        registrationStartDate: getDateInputValue(race?.registrationStartDate),
        registrationEndDate: getDateInputValue(race?.registrationEndDate),
        description: race?.description || "",
        checkInDetails: guide?.essentials?.checkInInfo || race?.checkInDetails || "",
        links: {
          website: guide?.links?.website || race?.website || "",
          contactEmail: guide?.links?.contactEmail || race?.contactEmail || "",
        },
      };
    };
    const getDateInputValue = (value) => {
      if (!value) return "";
      if (typeof value === "string") return value;
      if (value?.seconds) return new Date(value.seconds * 1000).toLocaleDateString();
      if (value?.toDate) return value.toDate().toLocaleDateString();
      return "";
    };

    const downloadCsv = (rows, filename) => {
      const csv = rows
        .map((row) =>
          row.map((cell) => `"${String(cell ?? "").replace(/"/g, '""')}"`).join(",")
        )
        .join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    };

    function DirectorPortal() {
      const [authUser, setAuthUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [profile, setProfile] = useState(null);
      const [races, setRaces] = useState([]);
      const [activeRaceId, setActiveRaceId] = useState("");
      const [activeRace, setActiveRace] = useState(null);
      const [tab, setTab] = useState("overview");
      const [registrations, setRegistrations] = useState([]);
      const [resultsMap, setResultsMap] = useState({});
      const [userMap, setUserMap] = useState({});
      const [search, setSearch] = useState("");
      const [editor, setEditor] = useState({
        slogan: "",
        featuredImageUrl: "",
        logoUrl: "",
        difficulty: "",
      });
      const [guideEditor, setGuideEditor] = useState(() => normalizeGuideEditor(null));
      const [guideDistIdx, setGuideDistIdx] = useState(0);
      const [loginState, setLoginState] = useState({ email: "", password: "", error: "" });
      const [resetState, setResetState] = useState({ email: "", status: "", error: "" });
      const [passwordForm, setPasswordForm] = useState({
        current: "",
        next: "",
        confirm: "",
        error: "",
        saving: false,
        success: false,
      });
      const [stripeStatus, setStripeStatus] = useState({ connected: false, onboardingComplete: false, loading: true });
      const [earnings, setEarnings] = useState(null);
      const [stripeLoading, setStripeLoading] = useState(false);

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
          setAuthUser(user || null);
          setAuthReady(true);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!authUser) {
          setProfile(null);
          return;
        }
        const unsubscribe = db.collection("users").doc(authUser.uid).onSnapshot((doc) => {
          setProfile(doc.exists ? { id: doc.id, ...doc.data() } : null);
        });
        return () => unsubscribe();
      }, [authUser]);

      useEffect(() => {
        if (!authUser) return;
        const raceQuery = db
          .collection("trails")
          .where("directorId", "==", authUser.uid);
        const unsubscribe = raceQuery.onSnapshot((snapshot) => {
          const list = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          setRaces(list);
          if (!activeRaceId && list.length > 0) {
            setActiveRaceId(list[0].id);
          }
        });
        return () => unsubscribe();
      }, [authUser, activeRaceId]);

      useEffect(() => {
        if (!activeRaceId) return;
        const unsubscribe = db.collection("trails").doc(activeRaceId).onSnapshot((doc) => {
          setActiveRace(doc.exists ? { id: doc.id, ...doc.data() } : null);
        });
        return () => unsubscribe();
      }, [activeRaceId]);

      useEffect(() => {
        if (!activeRaceId) return;
        const unsubscribe = db
          .collection("registrations")
          .where("trailId", "==", activeRaceId)
          .onSnapshot((snapshot) => {
            setRegistrations(snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() })));
          });
        return () => unsubscribe();
      }, [activeRaceId]);

      useEffect(() => {
        if (!activeRaceId) return;
        const unsubscribe = db
          .collection("completed_races")
          .where("trailId", "==", activeRaceId)
          .onSnapshot((snapshot) => {
            const map = {};
            snapshot.forEach((doc) => {
              const data = doc.data();
              if (data.userId) map[data.userId] = { id: doc.id, ...data };
            });
            setResultsMap(map);
          });
        return () => unsubscribe();
      }, [activeRaceId]);

      useEffect(() => {
        const missing = registrations
          .map((reg) => reg.userId)
          .filter((uid) => uid && !userMap[uid]);
        if (missing.length === 0) return;
        missing.forEach(async (uid) => {
          const snap = await db.collection("users").doc(uid).get();
          if (snap.exists) {
            setUserMap((prev) => ({ ...prev, [uid]: { id: uid, ...snap.data() } }));
          }
        });
      }, [registrations, userMap]);

      useEffect(() => {
        if (!activeRace) return;
        setEditor({
          slogan: activeRace.slogan || "",
          featuredImageUrl: activeRace.image || activeRace.imageUrl || "",
          logoUrl: activeRace.logoUrl || "",
          difficulty: activeRace.difficulty || "",
        });
      }, [activeRace]);

      useEffect(() => {
        if (!activeRace) return;
        setGuideEditor(normalizeGuideEditor(activeRace));
      }, [activeRace]);

      // ─── Stripe Connect: check status and load earnings ─────────────────────
      useEffect(() => {
        if (!authUser) return;
        setStripeStatus(s => ({ ...s, loading: true }));
        const checkStatus = fncs.httpsCallable("getStripeAccountStatus");
        checkStatus({}).then(res => {
          setStripeStatus({ ...res.data, loading: false });
        }).catch(() => {
          setStripeStatus({ connected: false, onboardingComplete: false, loading: false });
        });
      }, [authUser]);

      useEffect(() => {
        if (!authUser || !stripeStatus.connected) return;
        const getEarnings = fncs.httpsCallable("getDirectorEarnings");
        getEarnings({}).then(res => setEarnings(res.data)).catch(console.error);
      }, [authUser, stripeStatus.connected]);

      const handleStripeSetup = async () => {
        setStripeLoading(true);
        try {
          if (!stripeStatus.connected) {
            const create = fncs.httpsCallable("createStripeConnectAccount");
            await create({});
          }
          const getLink = fncs.httpsCallable("getStripeConnectOnboardingLink");
          const result = await getLink({ returnUrl: window.location.href, refreshUrl: window.location.href });
          window.open(result.data.url, "_blank");
        } catch (err) {
          alert("Error setting up Stripe: " + (err.message || err));
        }
        setStripeLoading(false);
      };

      const handleStripeDashboard = async () => {
        setStripeLoading(true);
        try {
          const getLink = fncs.httpsCallable("getStripeDashboardLink");
          const result = await getLink({});
          window.open(result.data.url, "_blank");
        } catch (err) {
          alert("Error opening dashboard: " + (err.message || err));
        }
        setStripeLoading(false);
      };

      const hasAssignedRace = races.length > 0;
      const isAuthorized =
        authUser && (!hasAssignedRace || !activeRace || activeRace.directorId === authUser.uid);
      const priceValue = parseFloat(activeRace?.price) || 0;
      const capacityValue = parseInt(activeRace?.capacity, 10) || 0;
      const previewDistances = Array.isArray(activeRace?.distancesOffered)
        ? activeRace.distancesOffered
        : typeof activeRace?.distancesOffered === "string"
          ? activeRace.distancesOffered.split(",").map((d) => d.trim()).filter(Boolean)
          : [];
      const previewElevation = activeRace?.elevationGain || activeRace?.elevation || "TBD";
      const revenue = priceValue * registrations.length;
      const fillPercent = capacityValue ? (registrations.length / capacityValue) * 100 : 0;
      const checkIns = registrations.filter((reg) => reg.checkedIn).length;
      const checkInPercent = registrations.length ? (checkIns / registrations.length) * 100 : 0;
      const finisherCount = Object.values(resultsMap).filter((r) => r.official).length;

      const filteredRegistrations = useMemo(() => {
        const term = search.toLowerCase();
        return registrations.filter((reg) => {
          const info = userMap[reg.userId] || {};
          const name = `${info.name || info.username || ""}`.toLowerCase();
          const bib = `${reg.bibNumber || ""}`.toLowerCase();
          return name.includes(term) || bib.includes(term);
        });
      }, [registrations, search, userMap]);

      const handlePasswordUpdate = async () => {
        if (!auth.currentUser) return;
        const trimmedNext = passwordForm.next.trim();
        if (!passwordForm.current.trim()) {
          setPasswordForm((prev) => ({ ...prev, error: "Enter your temporary password." }));
          return;
        }
        if (trimmedNext.length < 8) {
          setPasswordForm((prev) => ({ ...prev, error: "New password must be at least 8 characters." }));
          return;
        }
        if (trimmedNext !== passwordForm.confirm.trim()) {
          setPasswordForm((prev) => ({ ...prev, error: "Passwords do not match." }));
          return;
        }
        setPasswordForm((prev) => ({ ...prev, saving: true, error: "", success: false }));
        try {
          const credential = firebase.auth.EmailAuthProvider.credential(
            auth.currentUser.email,
            passwordForm.current.trim()
          );
          await auth.currentUser.reauthenticateWithCredential(credential);
          await auth.currentUser.updatePassword(trimmedNext);
          await db.collection("users").doc(auth.currentUser.uid).set(
            {
              mustResetPassword: false,
              passwordUpdatedAt: new Date(),
            },
            { merge: true }
          );
          setPasswordForm({
            current: "",
            next: "",
            confirm: "",
            error: "",
            saving: false,
            success: true,
          });
        } catch (error) {
          console.error("Password update failed:", error);
          setPasswordForm((prev) => ({
            ...prev,
            saving: false,
            error: "Unable to update password. Please verify your temporary password.",
          }));
        }
      };

      const handleEditorSave = async () => {
        if (!activeRaceId) return;
        await db.collection("trails").doc(activeRaceId).update({
          slogan: editor.slogan,
          image: editor.featuredImageUrl,
          imageUrl: editor.featuredImageUrl,
          featuredImageUrl: editor.featuredImageUrl,
          logoUrl: editor.logoUrl,
          difficulty: editor.difficulty,
        });
      };

      const handleGuideSave = async () => {
        if (!activeRaceId) return;

        // Build cleaned distances array with per-distance guide fields
        const cleanDistances = (guideEditor.distances || []).map((d) => ({
          raceTitle: d.raceTitle || "",
          label: d.label || "",
          price: parseFloat(d.price) || 0,
          startTime: d.startTime || "",
          elevationGain: d.elevationGain || "",
          cutoffTime: d.cutoffTime || "",
          capacity: parseInt(d.capacity, 10) || 0,
          terrainTechnicality: parseInt(d.terrainTechnicality, 10) || 0,
          gpxRouteLink: d.gpxRouteLink || "",
          // Per-distance guide fields
          aidStations: d.aidStations ? parseInt(d.aidStations, 10) || 0 : 0,
          aidStationDetails: d.aidStationDetails || "",
          mandatoryGear: d.mandatoryGear || "",
          terrainNotes: d.terrainNotes || "",
          pacerPolicy: d.pacerPolicy || "",
          crewAccess: d.crewAccess || "",
          crewParking: d.crewParking || "",
          description: d.description || "",
        }));

        const primary = cleanDistances[0] || {};

        await db.collection("trails").doc(activeRaceId).set(
          {
            distances: cleanDistances,
            distancesOffered: cleanDistances.map((d) => d.label).filter(Boolean),
            // Backward-compat flat fields from primary distance
            startTime: primary.startTime || "",
            elevationGain: primary.elevationGain || "",
            elevation: primary.elevationGain || "",
            cutoffTime: primary.cutoffTime || "",
            price: primary.price || 0,
            capacity: primary.capacity || 0,
            terrainTechnicality: primary.terrainTechnicality || 0,
            gpxRouteLink: primary.gpxRouteLink || "",
            aidStations: primary.aidStations || 0,
            aidStationDetails: primary.aidStationDetails || "",
            mandatoryGear: primary.mandatoryGear || "",
            checkInDetails: guideEditor.checkInDetails || "",
            terrainNotes: primary.terrainNotes || "",
            pacerPolicy: primary.pacerPolicy || "",
            crewAccess: primary.crewAccess || "",
            crewParking: primary.crewParking || "",
            description: guideEditor.description || primary.description || "",
            date: guideEditor.date || "",
            location: guideEditor.location || "",
            registrationStartDate: guideEditor.registrationStartDate || "",
            registrationEndDate: guideEditor.registrationEndDate || "",
            guide: {
              links: {
                website: guideEditor.links.website || "",
                contactEmail: guideEditor.links.contactEmail || "",
              },
            },
            updatedAt: new Date(),
          },
          { merge: true }
        );
      };

      const handleBibSave = async (registrationId, bibNumber) => {
        await db.collection("registrations").doc(registrationId).set(
          { bibNumber: bibNumber || "", bibUpdatedAt: new Date() },
          { merge: true }
        );
      };

      const handleCheckIn = async (registrationId, nextValue) => {
        await db.collection("registrations").doc(registrationId).set(
          { checkedIn: nextValue, checkedInAt: nextValue ? new Date() : null },
          { merge: true }
        );
      };

      const handleResultSave = async (userId, finishTime, isOfficial) => {
        if (!activeRaceId) return;
        await db.collection("completed_races").doc(`${activeRaceId}_${userId}`).set(
          {
            userId,
            trailId: activeRaceId,
            finishTime: finishTime || "",
            official: !!isOfficial,
            updatedAt: new Date(),
          },
          { merge: true }
        );
      };

      const handlePushOfficial = async () => {
        if (!activeRaceId) return;
        const batch = db.batch();
        registrations.forEach((reg) => {
          const result = resultsMap[reg.userId];
          if (result?.official) {
            batch.set(

                    <div className="bg-slate-900/70 rounded-xl p-4">
                      <p className="text-slate-400 uppercase tracking-wider text-xs mb-2">Pacer Policy</p>
                      <textarea rows={3} className="w-full bg-transparent text-slate-100 focus:outline-none resize-none" value={activeDist.pacerPolicy || ""} onChange={(e) => updateDist("pacerPolicy", e.target.value)}></textarea>
                    </div>
                    <div className="bg-slate-900/70 rounded-xl p-4">
                      <p className="text-slate-400 uppercase tracking-wider text-xs mb-2">Crew Access</p>
                      <textarea rows={3} className="w-full bg-transparent text-slate-100 focus:outline-none resize-none" value={activeDist.crewAccess || ""} onChange={(e) => updateDist("crewAccess", e.target.value)}></textarea>
                    </div>
                    <div className="bg-slate-900/70 rounded-xl p-4">
                      <p className="text-slate-400 uppercase tracking-wider text-xs mb-2">Crew Parking</p>
                      <textarea rows={3} className="w-full bg-transparent text-slate-100 focus:outline-none resize-none" value={activeDist.crewParking || ""} onChange={(e) => updateDist("crewParking", e.target.value)}></textarea>
                    </div>
                  </div>
                </div>

                {/* Links (event-level) */}
                <div className="glass rounded-[2rem] p-6">
                  <h4 className="text-lg font-semibold text-emerald-300 mb-4">Links</h4>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div className="bg-slate-900/70 rounded-xl p-4">
                      <p className="text-slate-400 uppercase tracking-wider text-xs mb-2">Website</p>
                      <input type="url" className="w-full bg-transparent text-slate-100 focus:outline-none" value={guideEditor.links.website} onChange={(e) => setGuideEditor((prev) => ({ ...prev, links: { ...prev.links, website: e.target.value } }))} />
                    </div>
                    <div className="bg-slate-900/70 rounded-xl p-4">
                      <p className="text-slate-400 uppercase tracking-wider text-xs mb-2">Contact Email</p>
                      <input type="email" className="w-full bg-transparent text-slate-100 focus:outline-none" value={guideEditor.links.contactEmail} onChange={(e) => setGuideEditor((prev) => ({ ...prev, links: { ...prev.links, contactEmail: e.target.value } }))} />
                    </div>
                  </div>
                </div>

                <div className="flex flex-wrap items-center gap-3">
                  <button onClick={handleGuideSave} className="bg-emerald-500 text-white px-5 py-2 rounded-[2rem]">Save Guide Updates</button>
                  <span className="text-xs text-slate-400">Saving updates will immediately refresh the public guide view.</span>
                </div>
              </div>
              );
            })()}

            {tab === "roster" && (
              <div className="glass rounded-[2rem] p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-emerald-400">Roster</h3>
                  <button
                    onClick={() => downloadCsv(rosterCsv, "roster.csv")}
                    className="bg-emerald-500 text-white px-4 py-2 rounded-[2rem] text-xs"
                  >
                    Export Roster
                  </button>
                </div>
                <div className="overflow-x-auto">
                  <table className="min-w-[900px] text-sm">
                    <thead className="text-slate-400">
                      <tr>
                        <th className="text-left py-2">Runner</th>
                        <th className="text-left py-2">Email</th>
                        <th className="text-left py-2">Bib</th>
                        <th className="text-left py-2">Check-in</th>
                        <th className="text-left py-2">Privacy</th>
                      </tr>
                    </thead>
                    <tbody>
                      {registrations.map((reg) => {
                        const info = userMap[reg.userId] || {};
                        const isPrivate = info.isPrivate === true;
                        return (
                          <tr key={reg.id} className="border-t border-slate-800">
                            <td className="py-3">{info.name || info.username || "Runner"}</td>
                            <td className="py-3 text-slate-400">
                              {isPrivate ? "Privacy Protected" : info.email || ""}
                            </td>
                            <td className="py-3">{reg.bibNumber || "-"}</td>
                            <td className="py-3">{reg.checkedIn ? "Yes" : "No"}</td>
                            <td className="py-3 text-emerald-400">{isPrivate ? "Protected" : "Public"}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {tab === "race-day" && (
              <div className="glass rounded-[2rem] p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-emerald-400">Race Day Check-in</h3>
                  <input
                    className="bg-slate-950 border border-slate-800 rounded-[2rem] px-4 py-2 text-slate-100"
                    placeholder="Search by name or bib"
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                  />
                </div>
                <div className="space-y-3">
                  {filteredRegistrations.map((reg) => {
                    const info = userMap[reg.userId] || {};
                    return (
                      <div key={reg.id} className="flex items-center justify-between bg-slate-950 rounded-[2rem] px-4 py-3">
                        <div>
                          <p className="text-slate-100">{info.name || info.username || "Runner"}</p>
                          <p className="text-xs text-slate-400">Bib: {reg.bibNumber || "--"}</p>
                        </div>
                        <input
                          defaultValue={reg.bibNumber || ""}
                          onBlur={(e) => handleBibSave(reg.id, e.target.value)}
                          className="bg-slate-900 border border-slate-800 rounded-[2rem] px-3 py-2 text-slate-100 w-28"
                          placeholder="Bib #"
                        />
                        <button
                          onClick={() => handleCheckIn(reg.id, !reg.checkedIn)}
                          className={`px-4 py-2 rounded-[2rem] ${
                            reg.checkedIn ? "bg-emerald-500 text-white" : "bg-slate-900 text-slate-300"
                          }`}
                        >
                          {reg.checkedIn ? "At Start Line" : "Check In"}
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {tab === "results" && (
              <div className="glass rounded-[2rem] p-6">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-semibold text-emerald-400">Results</h3>
                  <button
                    onClick={handlePushOfficial}
                    className="bg-emerald-500 text-white px-4 py-2 rounded-[2rem] text-xs"
                  >
                    Push Official Results
                  </button>
                </div>
                <div className="space-y-3">
                  {filteredRegistrations
                    .filter((reg) => reg.checkedIn)
                    .map((reg) => {
                      const info = userMap[reg.userId] || {};
                      const result = resultsMap[reg.userId] || {};
                      return (
                        <div key={reg.id} className="flex items-center justify-between bg-slate-950 rounded-[2rem] px-4 py-3">
                          <div>
                            <p className="text-slate-100">{info.name || info.username || "Runner"}</p>
                            <p className="text-xs text-slate-400">Bib: {reg.bibNumber || "--"}</p>
                          </div>
                          <input
                            defaultValue={result.finishTime || ""}
                            onBlur={(e) => handleResultSave(reg.userId, e.target.value, result.official)}
                            placeholder="HH:MM:SS"
                            className="bg-slate-900 border border-slate-800 rounded-[2rem] px-3 py-2 text-slate-100 w-40"
                          />
                          <button
                            onClick={() => handleResultSave(reg.userId, result.finishTime || "", !result.official)}
                            className={`px-4 py-2 rounded-[2rem] ${
                              result.official ? "bg-emerald-500 text-white" : "bg-slate-900 text-slate-300"
                            }`}
                          >
                            {result.official ? "Official" : "Mark Official"}
                          </button>
                        </div>
                      );
                    })}
                </div>
              </div>
            )}

            {tab === "payments" && (
              <div className="space-y-6">
                {/* Stripe Connect Status */}
                <div className="glass rounded-[2rem] p-6">
                  <h3 className="text-lg font-semibold text-emerald-400 mb-4">💳 Payment Setup (Stripe Connect)</h3>
                  {stripeStatus.loading ? (
                    <p className="text-slate-400">Checking Stripe status...</p>
                  ) : stripeStatus.onboardingComplete ? (
                    <div>
                      <div className="flex items-center gap-3 mb-4">
                        <span className="inline-block w-3 h-3 rounded-full bg-emerald-500"></span>
                        <span className="text-emerald-400 font-semibold">Stripe Connected — Payments Active</span>
                      </div>
                      <p className="text-slate-400 text-sm mb-4">
                        Your Stripe account is fully set up. Runner registration payments are processed and deposited directly to your bank account.
                      </p>
                      <button onClick={handleStripeDashboard} disabled={stripeLoading}
                        className="bg-slate-800 hover:bg-slate-700 text-emerald-400 px-6 py-3 rounded-[2rem] transition">
                        {stripeLoading ? "Opening..." : "Open Stripe Dashboard →"}
                      </button>
                    </div>
                  ) : stripeStatus.connected ? (
                    <div>
                      <div className="flex items-center gap-3 mb-4">
                        <span className="inline-block w-3 h-3 rounded-full bg-yellow-500"></span>
                        <span className="text-yellow-400 font-semibold">Onboarding Incomplete</span>
                      </div>
                      <p className="text-slate-400 text-sm mb-4">
                        Your Stripe account was created but setup isn't complete. Click below to finish connecting your bank account and identity verification.
                      </p>
                      <button onClick={handleStripeSetup} disabled={stripeLoading}
                        className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-[2rem] transition font-semibold">
                        {stripeLoading ? "Loading..." : "Complete Stripe Setup →"}
                      </button>
                    </div>
                  ) : (
                    <div>
                      <div className="flex items-center gap-3 mb-4">
                        <span className="inline-block w-3 h-3 rounded-full bg-slate-500"></span>
                        <span className="text-slate-400 font-semibold">Not Connected</span>
                      </div>
                      <p className="text-slate-400 text-sm mb-4">
                        Connect your Stripe account to start accepting registration payments from runners. Payments go directly to your bank account, minus a small platform fee.
                      </p>
                      <button onClick={handleStripeSetup} disabled={stripeLoading}
                        className="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-[2rem] transition font-semibold">
                        {stripeLoading ? "Setting up..." : "Connect Stripe Account"}
                      </button>
                    </div>
                  )}
                </div>

                {/* Earnings Summary */}
                {earnings && (
                  <div className="glass rounded-[2rem] p-6">
                    <h3 className="text-lg font-semibold text-emerald-400 mb-4">Earnings Summary</h3>
                    <div className="grid grid-cols-4 gap-4 mb-6">
                      {[
                        { label: "Total Revenue", value: "$" + (earnings.totalRevenueCents / 100).toFixed(2) },
                        { label: "Platform Fees (" + earnings.platformFeePercent + "%)", value: "$" + (earnings.totalPlatformFeesCents / 100).toFixed(2) },
                        { label: "Your Net Earnings", value: "$" + (earnings.totalNetEarningsCents / 100).toFixed(2) },
                        { label: "Total Registrations", value: earnings.totalRegistrations.toString() },
                      ].map(c => (
                        <div key={c.label} className="bg-slate-950 rounded-[2rem] p-4">
                          <p className="text-xs text-slate-400">{c.label}</p>
                          <p className="text-xl font-semibold text-emerald-400 mt-1">{c.value}</p>
                        </div>
                      ))}
                    </div>

                    {/* Per-Race Breakdown */}
                    {Object.keys(earnings.raceBreakdown || {}).length > 0 && (
                      <div>
                        <h4 className="text-sm font-semibold text-slate-300 mb-3">Per-Race Breakdown</h4>
                        <div className="space-y-2">
                          {Object.entries(earnings.raceBreakdown).map(([raceName, data]) => (
                            <div key={raceName} className="flex items-center justify-between bg-slate-950 rounded-[2rem] px-4 py-3">
                              <div>
                                <p className="text-slate-100 font-medium">{raceName}</p>
                                <p className="text-xs text-slate-400">{data.count} registration{data.count !== 1 ? "s" : ""}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-emerald-400 font-semibold">${((data.revenue - data.fees) / 100).toFixed(2)}</p>
                                <p className="text-xs text-slate-400">net earnings</p>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* How it works */}
                <div className="glass rounded-[2rem] p-6">
                  <h3 className="text-lg font-semibold text-emerald-400 mb-4">How Payments Work</h3>
                  <div className="space-y-3 text-sm text-slate-300">
                    <div className="flex items-start gap-3">
                      <span className="text-emerald-400 font-bold">1.</span>
                      <p>A runner finds your race on TrailMatch and registers through the app.</p>
                    </div>
                    <div className="flex items-start gap-3">
                      <span className="text-emerald-400 font-bold">2.</span>
                      <p>They pay securely via Stripe (credit/debit card, Apple Pay, Google Pay).</p>
                    </div>
                    <div className="flex items-start gap-3">
                      <span className="text-emerald-400 font-bold">3.</span>
                      <p>The registration fee is deposited to your connected bank account, minus a small platform fee.</p>
                    </div>
                    <div className="flex items-start gap-3">
                      <span className="text-emerald-400 font-bold">4.</span>
                      <p>Payouts happen on Stripe's standard schedule (typically 2 business days).</p>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<DirectorPortal />);
  </script>
</body>
</html>
